name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: astron
          POSTGRES_PASSWORD: astron
          POSTGRES_DB: astron_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astron -d astron_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://astron:astron@localhost:5432/astron_test
      FRONTEND_ORIGIN: http://localhost:3000
      RUN_DB_TESTS: "1"
      RUN_ORDER_DB_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run --cwd backend db:migrate
      - run: bun run check
      - run: bunx playwright install --with-deps chromium
        working-directory: frontend
      - run: bun run e2e
        working-directory: frontend
